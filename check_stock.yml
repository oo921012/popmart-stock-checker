name: Pop Mart 庫存偵測

on:
  schedule:
    # 每 30 分鐘執行一次（UTC 時間）
    - cron: "*/30 * * * *"
  # 也可以手動觸發（測試用）
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安裝套件
        run: pip install requests

      - name: 執行庫存偵測
        id: stock
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python check_stock.py

      - name: 結果摘要
        run: |
          if [ "${{ steps.stock.outputs.in_stock }}" = "true" ]; then
            echo "🟢 有貨！通知信已發送。"
          else
            echo "🔴 目前仍售罄。"
          fi
